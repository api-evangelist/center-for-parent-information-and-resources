description: >-
  The Center for Parent Information and Resources (CPIR) is a federally funded
  central hub of information and products for the national network of Parent
  Training and Information Centers (PTIs) and Community Parent Resource Centers
  (CPRCs). CPIR supports families and youth, with a focus on children and youth
  with disabilities, delivering resources via the Parent Center Hub website,
  the Buzz from the Hub newsletter, and an events calendar. No public developer
  API has been identified; content and updates are delivered through website
  browsing, newsletter subscription, and an embedded Google Calendar.
